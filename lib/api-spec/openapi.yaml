openapi: 3.0.3
info:
  title: Api
  version: 0.1.0
  description: Job Listing Portal API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: profile
  - name: jobs
  - name: applications
  - name: stats

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Create a new account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterPayload"
      responses:
        "200":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Sign in to an existing account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginPayload"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Sign out
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get the currently signed-in user (or null)
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"

  /profile/seeker:
    get:
      operationId: getSeekerProfile
      tags: [profile]
      summary: Get the current seeker's profile
      responses:
        "200":
          description: Profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeekerProfile"
    put:
      operationId: updateSeekerProfile
      tags: [profile]
      summary: Update the current seeker's profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SeekerProfileUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeekerProfile"

  /profile/employer:
    get:
      operationId: getEmployerProfile
      tags: [profile]
      summary: Get the current employer's profile
      responses:
        "200":
          description: Profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployerProfile"
    put:
      operationId: updateEmployerProfile
      tags: [profile]
      summary: Update the current employer's profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmployerProfileUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployerProfile"

  /jobs:
    get:
      operationId: listJobs
      tags: [jobs]
      summary: Search and list job postings
      parameters:
        - in: query
          name: q
          schema: { type: string }
        - in: query
          name: location
          schema: { type: string }
        - in: query
          name: jobType
          schema:
            $ref: "#/components/schemas/JobType"
        - in: query
          name: minSalary
          schema: { type: integer, minimum: 0 }
        - in: query
          name: featured
          schema: { type: boolean }
      responses:
        "200":
          description: Jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JobSummary"
    post:
      operationId: createJob
      tags: [jobs]
      summary: Create a new job posting (employer only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobCreate"
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"

  /jobs/{id}:
    get:
      operationId: getJob
      tags: [jobs]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
    patch:
      operationId: updateJob
      tags: [jobs]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
    delete:
      operationId: deleteJob
      tags: [jobs]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /jobs/{id}/apply:
    post:
      operationId: applyToJob
      tags: [applications]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplyBody"
      responses:
        "200":
          description: Applied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"

  /jobs/{id}/applications:
    get:
      operationId: listJobApplications
      tags: [applications]
      summary: List applications for a job (employer owner only)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Applications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ApplicationWithSeeker"

  /employer/jobs:
    get:
      operationId: listMyJobs
      tags: [jobs]
      summary: List the current employer's job postings
      responses:
        "200":
          description: Jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JobWithCounts"

  /seeker/applications:
    get:
      operationId: listMyApplications
      tags: [applications]
      summary: List the current seeker's applications
      responses:
        "200":
          description: Applications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ApplicationWithJob"

  /applications/{id}:
    patch:
      operationId: updateApplication
      tags: [applications]
      summary: Update an application status (employer only)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplicationUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"

  /stats/dashboard:
    get:
      operationId: getDashboardStats
      tags: [stats]
      summary: Aggregated dashboard stats for the current user
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok]

    OkResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean

    UserRole:
      type: string
      enum: [seeker, employer]

    JobType:
      type: string
      enum: [full_time, part_time, contract, internship, temporary]

    ApplicationStatus:
      type: string
      enum: [pending, reviewing, interview, accepted, rejected]

    AuthUser:
      type: object
      required: [id, email, role, createdAt]
      properties:
        id: { type: string }
        email: { type: string }
        role: { $ref: "#/components/schemas/UserRole" }
        createdAt: { type: string, format: date-time }

    MeResponse:
      type: object
      required: [user]
      properties:
        user:
          allOf:
            - $ref: "#/components/schemas/AuthUser"
          nullable: true

    RegisterPayload:
      type: object
      required: [email, password, role]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 6 }
        role: { $ref: "#/components/schemas/UserRole" }
        fullName: { type: string }
        companyName: { type: string }

    LoginPayload:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string }

    SeekerProfile:
      type: object
      required: [userId, fullName, headline, location, phone, bio, resumeUrl, skills, updatedAt]
      properties:
        userId: { type: string }
        fullName: { type: string }
        headline: { type: string }
        location: { type: string }
        phone: { type: string }
        bio: { type: string }
        resumeUrl: { type: string }
        skills:
          type: array
          items: { type: string }
        updatedAt: { type: string, format: date-time }

    SeekerProfileUpdate:
      type: object
      properties:
        fullName: { type: string }
        headline: { type: string }
        location: { type: string }
        phone: { type: string }
        bio: { type: string }
        resumeUrl: { type: string }
        skills:
          type: array
          items: { type: string }

    EmployerProfile:
      type: object
      required: [userId, companyName, website, industry, location, description, logoUrl, updatedAt]
      properties:
        userId: { type: string }
        companyName: { type: string }
        website: { type: string }
        industry: { type: string }
        location: { type: string }
        description: { type: string }
        logoUrl: { type: string }
        updatedAt: { type: string, format: date-time }

    EmployerProfileUpdate:
      type: object
      properties:
        companyName: { type: string }
        website: { type: string }
        industry: { type: string }
        location: { type: string }
        description: { type: string }
        logoUrl: { type: string }

    JobCreate:
      type: object
      required: [title, description, location, jobType]
      properties:
        title: { type: string }
        description: { type: string }
        qualifications: { type: string }
        responsibilities: { type: string }
        location: { type: string }
        jobType: { $ref: "#/components/schemas/JobType" }
        salaryMin: { type: integer, minimum: 0 }
        salaryMax: { type: integer, minimum: 0 }
        currency: { type: string }
        tags:
          type: array
          items: { type: string }

    JobUpdate:
      type: object
      properties:
        title: { type: string }
        description: { type: string }
        qualifications: { type: string }
        responsibilities: { type: string }
        location: { type: string }
        jobType: { $ref: "#/components/schemas/JobType" }
        salaryMin: { type: integer, minimum: 0 }
        salaryMax: { type: integer, minimum: 0 }
        currency: { type: string }
        tags:
          type: array
          items: { type: string }
        status:
          type: string
          enum: [open, closed]

    JobSummary:
      type: object
      required: [id, title, location, jobType, salaryMin, salaryMax, currency, tags, status, createdAt, companyName, companyLogoUrl]
      properties:
        id: { type: string }
        title: { type: string }
        location: { type: string }
        jobType: { $ref: "#/components/schemas/JobType" }
        salaryMin: { type: integer }
        salaryMax: { type: integer }
        currency: { type: string }
        tags:
          type: array
          items: { type: string }
        status: { type: string, enum: [open, closed] }
        createdAt: { type: string, format: date-time }
        companyName: { type: string }
        companyLogoUrl: { type: string }

    Job:
      type: object
      required:
        [
          id,
          employerId,
          title,
          description,
          qualifications,
          responsibilities,
          location,
          jobType,
          salaryMin,
          salaryMax,
          currency,
          tags,
          status,
          createdAt,
          updatedAt,
          companyName,
          companyLogoUrl,
          companyWebsite,
          companyIndustry,
          companyDescription,
        ]
      properties:
        id: { type: string }
        employerId: { type: string }
        title: { type: string }
        description: { type: string }
        qualifications: { type: string }
        responsibilities: { type: string }
        location: { type: string }
        jobType: { $ref: "#/components/schemas/JobType" }
        salaryMin: { type: integer }
        salaryMax: { type: integer }
        currency: { type: string }
        tags:
          type: array
          items: { type: string }
        status: { type: string, enum: [open, closed] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        companyName: { type: string }
        companyLogoUrl: { type: string }
        companyWebsite: { type: string }
        companyIndustry: { type: string }
        companyDescription: { type: string }

    JobWithCounts:
      type: object
      required: [id, title, location, jobType, status, createdAt, applicationCount]
      properties:
        id: { type: string }
        title: { type: string }
        location: { type: string }
        jobType: { $ref: "#/components/schemas/JobType" }
        salaryMin: { type: integer }
        salaryMax: { type: integer }
        currency: { type: string }
        status: { type: string, enum: [open, closed] }
        createdAt: { type: string, format: date-time }
        applicationCount: { type: integer }

    ApplyBody:
      type: object
      required: [coverLetter]
      properties:
        coverLetter: { type: string }
        resumeUrl: { type: string }

    Application:
      type: object
      required: [id, jobId, seekerId, coverLetter, resumeUrl, status, createdAt, updatedAt]
      properties:
        id: { type: string }
        jobId: { type: string }
        seekerId: { type: string }
        coverLetter: { type: string }
        resumeUrl: { type: string }
        status: { $ref: "#/components/schemas/ApplicationStatus" }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    ApplicationWithJob:
      type: object
      required:
        [id, jobId, status, coverLetter, createdAt, jobTitle, companyName, location, jobType]
      properties:
        id: { type: string }
        jobId: { type: string }
        status: { $ref: "#/components/schemas/ApplicationStatus" }
        coverLetter: { type: string }
        createdAt: { type: string, format: date-time }
        jobTitle: { type: string }
        companyName: { type: string }
        location: { type: string }
        jobType: { $ref: "#/components/schemas/JobType" }

    ApplicationWithSeeker:
      type: object
      required:
        [
          id,
          jobId,
          status,
          coverLetter,
          resumeUrl,
          createdAt,
          seekerEmail,
          seekerName,
          seekerHeadline,
          seekerLocation,
          seekerSkills,
        ]
      properties:
        id: { type: string }
        jobId: { type: string }
        status: { $ref: "#/components/schemas/ApplicationStatus" }
        coverLetter: { type: string }
        resumeUrl: { type: string }
        createdAt: { type: string, format: date-time }
        seekerEmail: { type: string }
        seekerName: { type: string }
        seekerHeadline: { type: string }
        seekerLocation: { type: string }
        seekerSkills:
          type: array
          items: { type: string }

    ApplicationUpdate:
      type: object
      required: [status]
      properties:
        status: { $ref: "#/components/schemas/ApplicationStatus" }

    DashboardStats:
      type: object
      required: [role, totalJobs, totalApplications, openJobs, recentActivityCount]
      properties:
        role: { $ref: "#/components/schemas/UserRole" }
        totalJobs: { type: integer }
        totalApplications: { type: integer }
        openJobs: { type: integer }
        recentActivityCount: { type: integer }
